<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>서버 출입 대장</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=2026061805)}">
</head>
<body>
<main class="page-shell">
    <header class="top-bar">
        <div>
            <p class="eyebrow">Server Access Log</p>
            <h1>서버 출입 대장</h1>
        </div>
        <a class="button-link" th:href="@{/admin}">관리자</a>
    </header>

    <form class="entry-form" th:action="@{/access-logs}" th:object="${accessLogForm}" method="post" enctype="multipart/form-data">
        <div class="form-alert" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
        </div>

        <div class="form-grid">
            <label>
                <span>소속</span>
                <input th:field="*{companyName}" autocomplete="organization">
                <small th:errors="*{companyName}"></small>
            </label>
            <label>
                <span>성명</span>
                <input th:field="*{visitorName}" autocomplete="name">
                <small th:errors="*{visitorName}"></small>
            </label>
            <label>
                <span>생년월일</span>
                <input type="text" th:field="*{birthDate}" inputmode="numeric" placeholder="예: 19900101">
                <small th:errors="*{birthDate}"></small>
            </label>
            <label>
                <span>입실 시간</span>
                <input type="datetime-local" th:field="*{visitedAt}">
                <small th:errors="*{visitedAt}"></small>
            </label>
        </div>

        <label class="wide-field">
            <span>출입사유</span>
            <textarea th:field="*{content}" rows="5"></textarea>
            <small th:errors="*{content}"></small>
        </label>

        <section class="signature-panel">
            <div class="section-heading">
                <h2>서명</h2>
                <button class="icon-button" type="button" id="clearSignature" aria-label="서명 지우기" title="서명 지우기">↺</button>
            </div>
            <canvas id="signatureCanvas" width="900" height="320"></canvas>
            <input type="hidden" th:field="*{signatureData}" id="signatureData">
            <small th:errors="*{signatureData}"></small>
        </section>

        <section class="consent-panel">
            <label class="check-line">
                <input type="checkbox" th:field="*{privacyAgreed}" id="privacyAgreed">
                <span>개인정보 수집 및 이용에 동의합니다.</span>
            </label>
            <small th:errors="*{privacyAgreed}"></small>
            <details>
                <summary>개인정보 동의 조항 보기</summary>
                <div class="terms-box">
                    <p>수집 항목: 소속, 성명, 생년월일, 입실 시간, 출입사유, 서명</p>
                    <p>수집 목적: 서버실 출입 이력 관리, 보안 감사, 사고 발생 시 출입 사실 확인</p>
                    <p>보관 기간: 회사 내부 보안 정책에 따른 보관 기간 동안 보관 후 폐기</p>
                    <p>동의를 거부할 수 있으나, 동의하지 않을 경우 서버실 출입 기록 등록이 제한될 수 있습니다.</p>
                </div>
            </details>
        </section>

        <div class="actions right">
            <button class="entry-submit" type="submit" id="submitEntry" disabled>저장</button>
        </div>
    </form>
</main>
<script th:src="@{/js/signature.js(v=2026061802)}"></script>
</body>
</html>
