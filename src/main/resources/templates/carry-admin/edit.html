<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>장비 반출·입 관리대장 수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v=2026061902)}">
</head>
<body>
<main class="page-shell">
    <header class="top-bar">
        <div>
            <p class="eyebrow">Server Carry Register</p>
            <h1>장비 반출·입 관리대장 수정</h1>
        </div>
        <a class="button-link secondary" th:href="@{/server-carry/admin}">목록</a>
    </header>

    <form class="entry-form" th:action="@{/server-carry/admin/{id}/edit(id=${carryLog.id})}" th:object="${carryLogForm}" method="post">
        <div class="form-alert" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
        </div>

        <div class="form-grid">
            <label>
                <span>성명</span>
                <input th:field="*{visitorName}">
                <small th:errors="*{visitorName}"></small>
            </label>
            <label>
                <span>소속</span>
                <input th:field="*{companyName}">
                <small th:errors="*{companyName}"></small>
            </label>
            <label>
                <span>직급</span>
                <input th:field="*{jobTitle}">
                <small th:errors="*{jobTitle}"></small>
            </label>
            <label>
                <span>입실시간</span>
                <input type="datetime-local" th:field="*{visitedAt}">
                <small th:errors="*{visitedAt}"></small>
            </label>
            <label>
                <span>연락처</span>
                <input th:field="*{contact}">
                <small th:errors="*{contact}"></small>
            </label>
        </div>

        <div class="asset-grid">
            <section class="asset-panel">
                <h2>장비</h2>
                <div class="check-group">
                    <label class="check-line">
                        <input type="checkbox" th:field="*{equipmentInbound}" data-exclusive-group="equipment">
                        <span>반입</span>
                    </label>
                    <label class="check-line">
                        <input type="checkbox" th:field="*{equipmentOutbound}" data-exclusive-group="equipment">
                        <span>반출</span>
                    </label>
                </div>
                <label>
                    <span>모델명</span>
                    <input th:field="*{equipmentModelName}">
                    <small th:errors="*{equipmentModelName}"></small>
                </label>
            </section>

            <section class="asset-panel">
                <h2>저장매체</h2>
                <div class="check-group">
                    <label class="check-line">
                        <input type="checkbox" th:field="*{storageInbound}" data-exclusive-group="storage">
                        <span>반입</span>
                    </label>
                    <label class="check-line">
                        <input type="checkbox" th:field="*{storageOutbound}" data-exclusive-group="storage">
                        <span>반출</span>
                    </label>
                </div>
                <label>
                    <span>모델명</span>
                    <input th:field="*{storageModelName}">
                    <small th:errors="*{storageModelName}"></small>
                </label>
            </section>
        </div>

        <label class="wide-field">
            <span>작업 내역</span>
            <textarea th:field="*{workContent}" rows="5"></textarea>
            <small th:errors="*{workContent}"></small>
        </label>

        <section class="signature-panel">
            <div class="section-heading">
                <h2>서명</h2>
                <button class="icon-button" type="button" id="clearSignature" aria-label="새 서명 되돌리기" title="새 서명 되돌리기">↶</button>
            </div>
            <div class="current-signature">
                <span>현재 서명</span>
                <img th:src="@{/server-carry/admin/{id}/signature(id=${carryLog.id})}" alt="현재 서명">
            </div>
            <canvas id="signatureCanvas" width="900" height="320"></canvas>
            <input type="hidden" th:field="*{signatureData}" id="signatureData">
            <div class="file-row">
                <small>새 서명을 입력하지 않으면 기존 서명이 유지됩니다.</small>
            </div>
        </section>

        <div class="actions split">
            <a class="button-link secondary" th:href="@{/server-carry/admin}">취소</a>
            <button type="submit">저장</button>
        </div>
    </form>
</main>
<script th:src="@{/js/signature.js(v=2026061902)}"></script>
</body>
</html>
