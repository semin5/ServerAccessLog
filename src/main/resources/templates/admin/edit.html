<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>출입 기록 수정</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell">
    <header class="top-bar">
        <div>
            <p class="eyebrow">Admin</p>
            <h1>출입 기록 수정</h1>
        </div>
        <a class="quiet-link" th:href="@{/admin}">목록</a>
    </header>

    <form class="entry-form" th:action="@{/admin/{id}/edit(id=${accessLog.id})}" th:object="${accessLogForm}" method="post" enctype="multipart/form-data">
        <div class="form-alert" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
        </div>
        <div class="form-grid">
            <label>
                <span>소속</span>
                <input th:field="*{companyName}">
                <small th:errors="*{companyName}"></small>
            </label>
            <label>
                <span>성명</span>
                <input th:field="*{visitorName}">
                <small th:errors="*{visitorName}"></small>
            </label>
            <label>
                <span>생년월일</span>
                <input type="date" th:field="*{birthDate}">
                <small th:errors="*{birthDate}"></small>
            </label>
            <label>
                <span>출입 시간</span>
                <input type="datetime-local" th:field="*{visitedAt}">
                <small th:errors="*{visitedAt}"></small>
            </label>
        </div>

        <label class="wide-field">
            <span>출입사유</span>
            <textarea th:field="*{content}" rows="5"></textarea>
            <small th:errors="*{content}"></small>
        </label>

        <section class="signature-panel">
            <div class="section-heading">
                <h2>서명</h2>
                <button class="icon-button" type="button" id="clearSignature" aria-label="새 서명 지우기" title="새 서명 지우기">↺</button>
            </div>
            <div class="current-signature">
                <span>현재 서명</span>
                <img th:src="@{/admin/{id}/signature(id=${accessLog.id})}" alt="현재 서명">
            </div>
            <canvas id="signatureCanvas" width="900" height="320"></canvas>
            <input type="hidden" th:field="*{signatureData}" id="signatureData">
            <div class="file-row">
                <small>새 서명을 입력하지 않으면 기존 서명이 유지됩니다.</small>
            </div>
        </section>

        <div class="actions split">
            <button type="submit">저장</button>
            <a class="button-link secondary" th:href="@{/admin}">취소</a>
        </div>
    </form>
</main>
<script th:src="@{/js/signature.js}"></script>
</body>
</html>
